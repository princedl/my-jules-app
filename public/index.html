<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprout World</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header class="hud">
            <div class="stats">
                <span class="sunlight">☀️ 999</span>
                <span class="water">💧 100%</span>
            </div>
            <div class="level">LEVEL 1</div>
        </header>

        <main class="content">
            <h1 class="pixel-text title">HELLO WORLD</h1>
            <div class="pixel-text subtitle">Welcome to the Garden...</div>

            <div class="plant-sprite">
                🌿
            </div>

            <button class="pixel-btn">START GROWING</button>
        </main>
    </div>
</body>
</html>
