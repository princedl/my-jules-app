<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Owner Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Product Owner</h1>
            <div class="stats">
                <span class="stat">Sprint: <span class="hp-bar"><span class="hp-fill"></span></span></span>
                <span class="stat">Points: <span class="seed-count">42</span></span>
            </div>
        </header>

        <main>
            <div id="scene">
                <div class="plant-sprite main-plant"></div>
                <div class="dialogue-box">
                    <p>Welcome! I'm a Product Owner specializing in mobile credit card apps, bridging business goals with tech.</p>
                </div>
            </div>

            <div id="controls">
                <button class="game-btn">Resume</button>
                <button class="game-btn">Projects</button>
                <button class="game-btn">Experience</button>
                <button class="game-btn danger">Contact</button>
            </div>
        </main>

        <footer>
            <p>Level 10 - Mobile Payments</p>
        </footer>
    </div>
</body>
</html>
